<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - RS Arya</title>
    <style>
        body { font-family: Arial; text-align: center; margin-top: 100px; background-color: #f4f4f9; }
        .login-box { background: white; padding: 30px; border-radius: 10px; width: 300px; margin: auto; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Login Sistem</h2>
        {% if error %}
            <p style="color: red;">{{ error }}</p>
        {% endif %}
        
        <form method="POST" action="/">
            <input type="text" name="username" placeholder="Username (isi: admin)" required>
            <input type="password" name="password" placeholder="Password (isi: admin123)" required>
            <button type="submit">Masuk</button>
        </form>
    </div>
</body>
</html>
